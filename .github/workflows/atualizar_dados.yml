name: Atualizar dados afogamentos

on:
  schedule:
    - cron: "0 8 * * 1"   # toda segunda-feira às 08:00 UTC
  workflow_dispatch:        # permite rodar manualmente pelo GitHub

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar endpoint /dados_afogamentos
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET https://web-production-76ab9.up.railway.app/dados_afogamentos \
            --max-time 300)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Falha: status $STATUS"
            exit 1
          fi
